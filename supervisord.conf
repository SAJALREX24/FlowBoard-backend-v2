[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:gateway]
command=dotnet FlowBoard.Gateway.dll --urls "http://0.0.0.0:10000"
directory=/app/gateway
autostart=true
autorestart=true
startsecs=1
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:auth]
command=dotnet FlowBoard.Auth.dll --urls "http://0.0.0.0:5048"
directory=/app/auth
autostart=true
autorestart=true
startsecs=1
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:workspace]
command=sh -c "sleep 5 && dotnet FlowBoard.Workspace.dll --urls 'http://0.0.0.0:5277'"
directory=/app/workspace
autostart=true
autorestart=false
startsecs=6
startretries=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
